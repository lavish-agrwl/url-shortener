<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container header-content">
      <h1>URL Shortener Dashboard</h1>
      <div id="health-badge" class="badge badge-unknown">
        Checking Health...
      </div>
    </div>
  </header>

  <main class="container">
    <section id="shorten-section" class="card">
      <h2>Shorten a URL</h2>
      <form id="shorten-form">
        <div class="form-group">
          <label for="long-url">Long URL</label>
          <input type="url" id="long-url" required placeholder="https://example.com/very-long-url">
        </div>
        <div class="form-group">
          <label for="custom-slug">Custom slug (optional)</label>
          <input type="text" id="custom-slug" placeholder="my-slug">
        </div>
        <div class="form-group">
          <label for="expiry-date">Expiry date (optional)</label>
          <input type="date" id="expiry-date">
        </div>
        <button type="submit" id="shorten-btn">Shorten URL</button>
      </form>
      <div id="shorten-result" class="result-area hidden">
        <div class="result-content">
          <p><strong>Short URL:</strong> <span id="short-url-text"></span></p>
          <button id="copy-btn">Copy to Clipboard</button>
        </div>
        <div id="shorten-meta" class="meta-text"></div>
      </div>
      <div id="shorten-error" class="error-message hidden"></div>
    </section>

    <section id="manage-section" class="card">
      <h2>Manage URLs</h2>
      <div id="urls-loading" class="loading-message">Loading URLs...</div>
      <div id="urls-error" class="error-message hidden"></div>
      <div id="urls-content" class="hidden">
        <div class="referrers-container">
          <table id="urls-table">
            <thead>
              <tr>
                <th>Slug</th>
                <th>Original URL</th>
                <th>Created At</th>
                <th>Clicks</th>
              </tr>
            </thead>
            <tbody>
              <!-- Rows added by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="analytics-section" class="card">
      <h2>Analytics</h2>
      <div class="analytics-search">
        <div class="form-group inline">
          <label for="analytics-slug">Slug</label>
          <input type="text" id="analytics-slug" placeholder="enter slug">
          <button id="load-analytics-btn">Load Analytics</button>
        </div>
      </div>

      <div id="analytics-loading" class="loading-message hidden">Loading analytics...</div>
      <div id="analytics-error" class="error-message hidden"></div>

      <div id="analytics-content" class="hidden">
         <div class="stats-grid">
           <div class="stat-card">
             <span class="stat-label">Total Clicks</span>
             <span id="stat-total-clicks" class="stat-value">0</span>
           </div>
           <div class="stat-card">
             <span class="stat-label">Top Referrer</span>
             <span id="stat-top-referrer" class="stat-value">N/A</span>
           </div>
           <div class="stat-card">
             <span class="stat-label">Created At</span>
             <span id="stat-created-at" class="stat-value">N/A</span>
           </div>
         </div>

         <div class="chart-container">
           <h3>Clicks per Day</h3>
           <canvas id="clicks-chart"></canvas>
         </div>

        <div class="referrers-container">
          <h3>Top Referrers</h3>
          <table id="referrers-table">
            <thead>
              <tr>
                <th>Referrer</th>
                <th>Clicks</th>
              </tr>
            </thead>
            <tbody>
              <!-- Rows added by JS -->
            </tbody>
          </table>
        </div>

        <div class="referrers-container">
          <h3>Top Countries</h3>
          <table id="countries-table">
            <thead>
              <tr>
                <th>Country</th>
                <th>Clicks</th>
              </tr>
            </thead>
            <tbody>
              <!-- Rows added by JS -->
            </tbody>
          </table>
        </div>

      </div>
    </section>
  </main>

  <script src="chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
