version: "3.8"
services:
  app:
    build: .
    image: url-shortener-app:local
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/url-shortener
      - REDIS_URL=redis://redis:6379
      - BASE_URL=http://localhost:3000
    depends_on:
      - mongo
      - redis

  worker:
    build: .
    image: url-shortener-worker:local
    command: ["node", "./src/api/worker.js"]
    environment:
      - MONGODB_URI=mongodb://mongo:27017/url-shortener
      - REDIS_URL=redis://redis:6379
      - BASE_URL=http://localhost:3000
    depends_on:
      - mongo
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
    driver: local
